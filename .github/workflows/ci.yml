name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck -x macstate.sh lib/common.sh lib/diff.sh collectors/*.sh

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check lib/ tests/

      - name: Ruff format check
        run: ruff format --check lib/ tests/

  test-python:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install pytest
        run: pip install pytest

      - name: Run pytest
        run: python3 -m pytest tests/ -v

  test-bash:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run bash unit tests
        run: bash tests/run_tests.sh

  integration:
    runs-on: macos-latest
    needs: [test-python, test-bash]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        run: bash tests/test_integration.sh
